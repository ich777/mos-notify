name: Compile mos-notify

on:
  # Allow to trigger action manually
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.6'
    
    - name: Execute GO tidy
      run: go mod tidy
    
    - name: Build mos-notify and create .deb package
      run: |
        BUILDDIR=${{ github.workspace }}
        PACKAGEDIR=$BUILDDIR/mos-notify_package
        mkdir -p $PACKAGEDIR/DEBIAN $PACKAGEDIR/usr/bin $PACKAGEDIR/usr/share/doc/mos-notify $PACKAGEDIR/var/mos/notify

        go build -ldflags="-s -w" -o mos-notify

        mv $BUILDDIR/mos-notify $PACKAGEDIR/usr/bin/mos-notify

        # Add LICENSE from repo:
        cp "${{ github.workspace }}/LICENSE" "$PACKAGEDIR/usr/share/doc/mos-notify/LICENSE"
        echo -e "Format: https://www.debian.org/doc/packaging-manuals/copyright-format/1.0/\nUpstream-Name: MOS\nSource: https://github.com/ich777/mos-notify\n\nFiles: *\nCopyright: 2025 Christoph Hummer\nLicense: GPL-2.0" >> $PACKAGEDIR/usr/share/doc/mos-notify/copyright

        echo "[]" > $PACKAGEDIR/var/mos/notify/notifications.json

        cat > $PACKAGEDIR/DEBIAN/control << EOF
        Package: mos-notify
        Version: ${{ github.event.inputs.version }}-mos
        Architecture: amd64
        Maintainer: admin@minenet.at
        Description: mos-notify for MOS
        EOF

        cd $BUILDDIR
        chmod -R 755 $PACKAGEDIR
        dpkg-deb --build mos-notify_package mos-notify_${{ github.event.inputs.version }}_amd64.deb
        md5sum $BUILDDIR/mos-notify_${{ github.event.inputs.version }}_amd64.deb | awk '{print $1}' > $BUILDDIR/mos-notify_${{ github.event.inputs.version }}_amd64.deb.md5
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.event.inputs.version }}
        release_name: "mos-notify v${{ github.event.inputs.version }}"
        body: Docker mos-notify for MOS
        draft: false
        prerelease: false

    - name: Upload Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/mos-notify_${{ github.event.inputs.version }}_amd64.deb
        asset_name: mos-notify_${{ github.event.inputs.version }}_amd64.deb
        asset_content_type: application/octet-stream

    - name: Upload md5 to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ${{ github.workspace }}/mos-notify_${{ github.event.inputs.version }}_amd64.deb.md5
        asset_name: mos-notify_${{ github.event.inputs.version }}_amd64.deb.md5
        asset_content_type: text/plain

    - name: Cleanup
      if: always()
      run: rm -rf ${{ github.workspace }}/* ${{ github.workspace }}/.*
